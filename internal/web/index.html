<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>Starfleet — Fleet Console</title>
<style>
  :root {
    --bg: #0b0e14; --card: #151a23; --line: #232b38; --fg: #d7dee8;
    --dim: #8a97a8; --acc: #4aa3ff; --ok: #4ade80; --warn: #fbbf24;
    --bad: #f87171; --chip: #1d2532;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.45 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  header { position: sticky; top: 0; z-index: 5; background: var(--bg);
    border-bottom: 1px solid var(--line); padding: 10px 12px; display: flex;
    align-items: center; gap: 10px; }
  header h1 { font-size: 16px; margin: 0; flex: 1; letter-spacing: .3px; }
  header .me { font-size: 12px; color: var(--dim); }
  .tabs { display: flex; gap: 6px; overflow-x: auto; padding: 8px 12px;
    border-bottom: 1px solid var(--line); -webkit-overflow-scrolling: touch; }
  .tab { flex: 0 0 auto; padding: 8px 14px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--card); color: var(--dim);
    font-size: 13px; cursor: pointer; user-select: none; }
  .tab.on { background: var(--acc); color: #04121f; border-color: var(--acc); font-weight: 600; }
  main { padding: 12px; max-width: 760px; margin: 0 auto; }
  .page { display: none; } .page.on { display: block; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px; margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .grow { flex: 1; }
  .muted { color: var(--dim); font-size: 12px; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 999px;
    background: var(--chip); font-size: 12px; color: var(--fg); }
  .pill.ok { color: var(--ok); } .pill.warn { color: var(--warn); }
  .pill.bad { color: var(--bad); } .pill.dim { color: var(--dim); }
  .agent { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
  .stale { opacity: .55; }
  input, select, textarea, button { font: inherit; color: var(--fg);
    background: var(--chip); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 12px; width: 100%; }
  textarea { resize: vertical; min-height: 64px; }
  button { background: var(--acc); color: #04121f; font-weight: 600; cursor: pointer;
    border: none; width: auto; padding: 11px 18px; }
  button.sec { background: var(--chip); color: var(--fg); }
  button:active { transform: translateY(1px); }
  .actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .refresh { margin-left: auto; }
  .empty { color: var(--dim); text-align: center; padding: 24px 0; }
  .ev { font-family: ui-monospace, monospace; font-size: 12px; color: var(--dim);
    white-space: pre-wrap; word-break: break-all; padding: 4px 0; border-bottom: 1px solid var(--line); }
  .toast { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    background: var(--acc); color: #04121f; padding: 10px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 20; }
  .toast.show { opacity: 1; }
  .toast.err { background: var(--bad); color: #1a0606; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .bar { flex: 1; height: 8px; background: var(--chip); border: 1px solid var(--line);
    border-radius: 999px; overflow: hidden; min-width: 80px; }
  .bar .fill { height: 100%; background: var(--acc); }
  a { color: var(--acc); }
</style>
</head>
<body>
<header>
  <h1>★ Fleet Console</h1>
  <span class="me" id="me"></span>
  <button class="sec refresh" onclick="refresh()">↻</button>
</header>

<div class="tabs" id="tabs">
  <div class="tab on" data-p="status" onclick="show('status')">Flotte</div>
  <div class="tab" data-p="tasks" onclick="show('tasks')">Tasks</div>
  <div class="tab" data-p="bus" onclick="show('bus')">Bus</div>
  <div class="tab" data-p="talk" onclick="show('talk')">Funk</div>
  <div class="tab" data-p="log" onclick="show('log')">Log</div>
</div>

<main>
  <section class="page on" id="status">
    <div class="card" id="board"></div>
  </section>

  <section class="page" id="tasks">
    <div class="card">
      <b>Neue Aufgabe</b>
      <input id="t_title" placeholder="Titel" style="margin-top:8px">
      <textarea id="t_desc" placeholder="Beschreibung (optional)" style="margin-top:8px"></textarea>
      <div class="grid2" style="margin-top:8px">
        <input id="t_ship" placeholder="Ship (leer=offen, 'auto'=freier)">
        <select id="t_assign"><option value="">nicht zuweisen</option>
          <option value="auto">freien Ship wählen</option>
          <option value="name">explizit (oben)</option></select>
      </div>
      <div class="actions"><button onclick="taskNew()">Erfassen</button></div>
    </div>
    <div class="card" id="tasklist"></div>
  </section>

  <section class="page" id="bus">
    <div class="tabs" style="border:0;padding:0 0 8px;margin:0">
      <div class="tab on" data-b="msgs" onclick="busTab('msgs')">Direktiven</div>
      <div class="tab" data-b="inbox" onclick="busTab('inbox')">Inbox</div>
      <div class="tab" data-b="asks" onclick="busTab('asks')">Fragen</div>
    </div>
    <div class="row" style="margin-bottom:8px">
      <span class="muted">Ansicht:</span>
      <button class="sec" id="btn_thread" onclick="toggleThread()" style="width:auto;padding:6px 12px">💬 Threads: aus</button>
    </div>
    <div class="card" id="busbody"></div>
  </section>

  <section class="page" id="talk">
    <div class="card">
      <b>Nachricht an</b>
      <div class="grid2" style="margin-top:8px">
        <select id="talk_target"><option value="all">📡 ganze Flotte (all)</option></select>
        <input id="talk_text" placeholder="Text…">
      </div>
      <div class="actions"><button onclick="sendTell()">Senden</button></div>
    </div>
    <div class="card muted" id="talk_hint">Hinweis: Nachrichten gehen über den echten Agent-Bus (agent-bus tell / broadcast). Agents holen sie via inbox ab.</div>
  </section>

  <section class="page" id="log">
    <div class="card" id="events"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
const api = (p, opt) => fetch(p, opt).then(r => r.ok ? r.json() : Promise.reject(r));
let identity = { ship_id: "" };

function show(p){
  document.querySelectorAll('.page').forEach(s=>s.classList.toggle('on', s.id===p));
  document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.toggle('on', t.dataset.p===p));
  refresh();
}
function busTab(b){
  document.querySelectorAll('#bus .tab').forEach(t=>t.classList.toggle('on', t.dataset.b===b));
  loadBus(b);
}
function toast(msg, err){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.toggle('err', !!err); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function age(s){ s=Number(s)||0;
  if (s>=3600) return Math.floor(s/3600)+'h'+Math.floor((s%3600)/60)+'m';
  if (s>=60) return Math.floor(s/60)+'m';
  return s+'s'; }

async function refresh(){
  const cur = document.querySelector('.page.on')?.id;
  if (cur==='status') await loadBoard();
  else if (cur==='tasks') await loadTasks();
  else if (cur==='bus') await loadBus(document.querySelector('#bus .tab.on')?.dataset.b || 'msgs');
  else if (cur==='log') await loadEvents();
  else if (cur==='talk') await loadTargets();
}

async function loadIdentity(){
  try { identity = await api('/api/identity');
    document.getElementById('me').textContent = identity.ship_id ? '🛰 '+identity.ship_id : '';
  } catch(e){}
}

async function loadBoard(){
  const el = document.getElementById('board');
  try {
    const rows = await api('/api/board');
    if (!rows.length){ el.innerHTML = '<div class="empty">keine Agents gemeldet</div>'; return; }
    el.innerHTML = rows.map(r=>{
      const stale = r.stale ? ' stale' : '';
      const st = (r.state||'idle');
      const cls = st==='done'?'ok':(st==='blocked'?'bad':(st==='working'||st==='building'?'warn':'dim'));
      const prog = (Number(r.progress)||0);
      const bar = (r.progress!=null && prog>0) ? `
        <div class="bar"><div class="fill" style="width:${prog}%"></div></div>
        <span class="muted">${prog}%</span>` : '';
      const detail = [];
      if (r.task) detail.push(`<b>${esc(r.task)}</b>`);
      if (r.branch) detail.push(`<span class="pill dim">${esc(r.branch)}</span>`);
      if (r.blocker) detail.push(`<span class="pill bad">⛔ ${esc(r.blocker)}</span>`);
      if (r.eta) detail.push(`<span class="muted">ETA ${esc(r.eta)}</span>`);
      return `<div class="card${stale}">
        <div class="row"><span class="agent grow">${esc(r.agent)}</span>
          <span class="pill ${cls}">${esc(st)}</span></div>
        <div class="row" style="margin-top:6px">
          <span class="muted">${esc(r.project||'-')}</span>
          <span class="muted">· ${age(r.age_seconds)}</span>
          <span class="muted">· 📥 ${r.inbox_count}</span>
          ${r.stale?'<span class="pill bad">STALE</span>':''}
        </div>
        ${detail.length?`<div class="row" style="margin-top:6px">${detail.join(' ')}</div>`:''}
        ${bar?`<div class="row" style="margin-top:6px;align-items:center">${bar}</div>`:''}
        ${r.note?`<div class="muted" style="margin-top:6px">${esc(r.note)}</div>`:''}
      </div>`;
    }).join('');
  } catch(e){ el.innerHTML = '<div class="empty">Fehler: '+esc(e.message)+'</div>'; }
}

async function loadTasks(){
  const el = document.getElementById('tasklist');
  try {
    const rows = await api('/api/tasks');
    if (!rows.length){ el.innerHTML = '<div class="empty">keine Tasks</div>'; return; }
    el.innerHTML = rows.map(r=>{
      const cls = (r.status==='done')?'ok':(r.status==='assigned')?'warn':'dim';
      return `<div class="card">
        <div class="row"><b class="grow">${esc(r.title)}</b>
          <span class="pill ${cls}">${esc(r.status)}</span></div>
        <div class="muted" style="margin-top:4px">${esc(r.slug)} · 👤 ${esc(r.assigned_to||'-')}</div>
        <div class="actions">
          <select id="st_${esc(r.slug)}" style="width:auto">
            ${['open','assigned','in-progress','done','parked'].map(s=>`<option ${s===r.status?'selected':''}>${s}</option>`).join('')}
          </select>
          <button class="sec" onclick="taskStatus('${esc(r.slug)}')">Status</button>
          <button class="sec" onclick="taskUnassign('${esc(r.slug)}')">Frei</button>
        </div>
      </div>`;
    }).join('');
  } catch(e){ el.innerHTML = '<div class="empty">Fehler: '+esc(e.message)+'</div>'; }
}

async function taskNew(){
  const title = document.getElementById('t_title').value.trim();
  if (!title){ toast('Titel fehlt', true); return; }
  const desc = document.getElementById('t_desc').value.trim();
  const assignSel = document.getElementById('t_assign').value;
  let assign = '';
  if (assignSel==='auto') assign='__auto__';
  else if (assignSel==='name') assign=document.getElementById('t_ship').value.trim();
  else assign=document.getElementById('t_ship').value.trim();
  try {
    await api('/api/task', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({title, desc, assign})});
    toast('Task erfasst'); document.getElementById('t_title').value=''; document.getElementById('t_desc').value='';
    loadTasks();
  } catch(e){ toast('Fehler: '+esc(e.message), true); }
}
async function taskStatus(slug){
  const st = document.getElementById('st_'+slug).value;
  try { await api('/api/task', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({slug, status:st})}); toast('Status → '+st); loadTasks(); }
  catch(e){ toast('Fehler: '+esc(e.message), true); }
}
async function taskUnassign(slug){
  const fd = new FormData(); fd.set('slug', slug); fd.set('unassign','1');
  try { await api('/api/task', {method:'POST', body: fd}); toast('frei'); loadTasks(); }
  catch(e){ toast('Fehler: '+esc(e.message), true); }
}

let threadMode = false;
function toggleThread(){
  threadMode = !threadMode;
  const b = document.getElementById('btn_thread');
  b.textContent = threadMode ? '💬 Threads: an' : '💬 Threads: aus';
  b.classList.toggle('sec', !threadMode);
  loadBus(document.querySelector('#bus .tab.on')?.dataset.b || 'msgs');
}
function msgCard(r, indented){
  const tag = r.target ? `<span class="pill dim">→${esc(r.target)}</span>` :
              (r.acked!==undefined ? `<span class="pill ${r.acked?'ok':'warn'}">${r.acked?'✓':'…'}</span>` : '');
  const q = r.question ? esc(r.question) : esc(r.text);
  return `<div class="card" style="${indented?'margin-left:18px;border-left:3px solid var(--acc)':''}">
    <div class="row"><span class="agent grow">${esc(r.id)}</span>${tag}
      <span class="muted">${age(r.age_seconds)}</span></div>
    <div style="margin-top:6px">${q}</div>
    <div class="row" style="margin-top:4px">
      ${r.from?`<span class="muted">von ${esc(r.from)}</span>`:''}
      ${r.reply_to?`<a class="pill dim" href="#" onclick="jumpToMsg('${esc(r.reply_to)}');return false">↩ ${esc(r.reply_to)}</a>`:''}
    </div>
  </div>`;
}
function jumpToMsg(id){
  const el = document.querySelector('#busbody');
  const all = el.querySelectorAll('.card');
  // highlight the referenced message if present in the flat list
  for (const c of all){
    if (c.querySelector('.agent')?.textContent === id){
      c.scrollIntoView({behavior:'smooth', block:'center'});
      c.style.outline = '2px solid var(--acc)';
      setTimeout(()=>c.style.outline='', 1500);
      return;
    }
  }
  toast('Nachricht '+id+' nicht in dieser Ansicht');
}
async function loadBus(kind){
  const el = document.getElementById('busbody');
  try {
    let rows = [];
    if (kind==='inbox') rows = await api('/api/inbox');
    else if (kind==='asks') rows = await api('/api/asks');
    else rows = await api('/api/msgs');
    if (!rows.length){ el.innerHTML = '<div class="empty">leer</div>'; return; }
    if (threadMode && kind!=='asks'){
      // Build threads: messages with reply_to hang under their parent.
      const byID = {};
      rows.forEach(r=>byID[r.id]=r);
      const roots = [], children = {};
      rows.forEach(r=>{
        if (r.reply_to && byID[r.reply_to]){
          (children[r.reply_to] = children[r.reply_to] || []).push(r);
        } else {
          roots.push(r);
        }
      });
      const out = [];
      const walk = (node, depth)=>{
        out.push(msgCard(node, depth>0));
        (children[node.id]||[]).forEach(ch=>walk(ch, depth+1));
      };
      roots.forEach(r=>walk(r, 0));
      el.innerHTML = out.join('') || '<div class="empty">keine Threads</div>';
      return;
    }
    el.innerHTML = rows.map(r=>msgCard(r, false)).join('');
  } catch(e){ el.innerHTML = '<div class="empty">Fehler: '+esc(e.message)+'</div>'; }
}

async function loadTargets(){
  const sel = document.getElementById('talk_target');
  try {
    const rows = await api('/api/board');
    const opts = ['<option value="all">📡 ganze Flotte (all)</option>']
      .concat(rows.filter(r=>!r.stale).map(r=>`<option value="${esc(r.agent)}">${esc(r.agent)}</option>`));
    if (sel.innerHTML !== opts.join('')) sel.innerHTML = opts.join('');
  } catch(e){}
}
async function sendTell(){
  const target = document.getElementById('talk_target').value;
  const text = document.getElementById('talk_text').value.trim();
  if (!text){ toast('Text fehlt', true); return; }
  try {
    const r = await api('/api/tell', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({target, text})});
    toast('gesendet → '+(r.target||target)+' ('+r.id+')');
    document.getElementById('talk_text').value='';
  } catch(e){ toast('Fehler: '+esc(e.message), true); }
}

async function loadEvents(){
  const el = document.getElementById('events');
  try {
    const rows = await api('/api/events?n=50');
    if (!rows.length){ el.innerHTML = '<div class="empty">kein Log</div>'; return; }
    el.innerHTML = rows.map(l=>`<div class="ev">${esc(l)}</div>`).join('');
  } catch(e){ el.innerHTML = '<div class="empty">Fehler: '+esc(e.message)+'</div>'; }
}

loadIdentity().then(refresh);
setInterval(()=>{ const c=document.querySelector('.page.on')?.id; if(c==='status'||c==='log'||c==='bus') refresh(); }, 15000);
</script>
</body>
</html>
